[tool.uv.workspace]
members = [
  "backend",
  "packages/contracts-python",
]

[tool.uv]
required-version = ">=0.11.28,<0.12"
environments = [
  "sys_platform == 'win32'",
  "sys_platform == 'linux'",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["backend/tests", "packages/contracts-python/tests"]
markers = [
  "integration: requires an external PostgreSQL test database",
]
