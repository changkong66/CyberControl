version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-python)
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "02:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-frontend)
    groups:
      frontend-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /packages/contracts-go
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-go)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:45"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-ci)
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-container)
