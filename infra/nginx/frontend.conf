server {
  listen 8080;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;
  set $api_backend http://api:8000;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http://localhost:8080; frame-ancestors 'none'; frame-src http://localhost:8080; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'; form-action 'self' http://localhost:8080" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location = /healthz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"live"}';
  }

  location /internal/ {
    proxy_pass $api_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Trace-ID $http_x_trace_id;
    proxy_set_header X-Session-ID $http_x_session_id;
    proxy_set_header Last-Event-ID $http_last_event_id;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    add_header X-Accel-Buffering "no" always;
  }

  location /health/ {
    proxy_pass $api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Trace-ID $http_x_trace_id;
    proxy_buffering off;
    proxy_cache off;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store";
  }
}
