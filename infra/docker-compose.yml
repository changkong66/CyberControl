services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0@sha256:2eb3cd316835c990e69e26ade292ffa78f6fb0db7d5fc6377463c162e1979ac0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: local-admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: local-admin-only
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/cybercontrol-realm.json:/opt/keycloak/data/import/cybercontrol-realm.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-ec",
          "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  keycloak-config:
    image: quay.io/keycloak/keycloak:26.7.0@sha256:2eb3cd316835c990e69e26ade292ffa78f6fb0db7d5fc6377463c162e1979ac0
    entrypoint: ["/bin/bash", "/scripts/configure-user-profile.sh"]
    network_mode: "service:keycloak"
    environment:
      KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME: local-admin
      KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: local-admin-only
      KEYCLOAK_ADMIN_SERVER_URL: http://127.0.0.1:8080
    volumes:
      - ./keycloak/configure-user-profile.sh:/scripts/configure-user-profile.sh:ro
      - ./keycloak/user-profile.json:/config/user-profile.json:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_DB: liyans
      POSTGRES_USER: liyans_bootstrap
      POSTGRES_PASSWORD: liyans-bootstrap-local-only
    ports:
      - "${LIYAN_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - liyans-postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liyans_bootstrap -d liyans"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-role-bootstrap:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      PGPASSWORD: liyans-bootstrap-local-only
    command:
      [
        "psql",
        "--host=postgres",
        "--username=liyans_bootstrap",
        "--dbname=liyans",
        "--set=ON_ERROR_STOP=1",
        "--file=/scripts/001-runtime-role.sql",
      ]
    volumes:
      - ./postgres/init/001-runtime-role.sql:/scripts/001-runtime-role.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    environment:
      LIYAN_ENVIRONMENT: development
      LIYAN_DATABASE_URL: postgresql+asyncpg://liyans_app:liyans-app-local-only@postgres:5432/liyans
      LIYAN_DATABASE_MIGRATION_URL: postgresql+asyncpg://liyans_migrator:liyans-migrator-local-only@postgres:5432/liyans
      LIYAN_SSE_CURSOR_SECRET: local-compose-cursor-secret-change-me-32
    depends_on:
      postgres-role-bootstrap:
        condition: service_completed_successfully
    restart: "no"

  tenant-bind:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      PGPASSWORD: liyans-bootstrap-local-only
    command:
      [
        "psql",
        "--host=postgres",
        "--username=liyans_bootstrap",
        "--dbname=liyans",
        "--set=oidc_issuer=http://localhost:8080/realms/cybercontrol",
        "--file=/scripts/bind-demo-tenant.sql",
      ]
    volumes:
      - ./postgres/dev/bind-demo-tenant.sql:/scripts/bind-demo-tenant.sql:ro
    depends_on:
      keycloak:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  mock-provider:
    build:
      context: ..
      dockerfile: infra/mock-provider.Dockerfile
    environment:
      FIXTURE_PROVIDER_TOKEN: local-fixture-provider-only
      PORT: "8090"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health/ready', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  api:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment:
      LIYAN_ENVIRONMENT: development
      LIYAN_DATABASE_URL: postgresql+asyncpg://liyans_app:liyans-app-local-only@postgres:5432/liyans
      LIYAN_OUTBOX_DISPATCHER_DATABASE_URL: postgresql+asyncpg://liyans_dispatcher:liyans-dispatcher-local-only@postgres:5432/liyans
      LIYAN_IDENTITY_RECONCILER_DATABASE_URL: postgresql+asyncpg://liyans_identity_reconciler:liyans-identity-reconciler-local-only@postgres:5432/liyans
      LIYAN_OUTBOX_PUBLISHER_ENABLED: "true"
      LIYAN_SSE_NOTIFICATION_ENABLED: "true"
      LIYAN_SSE_NOTIFICATION_DATABASE_URL: postgresql+asyncpg://liyans_app:liyans-app-local-only@postgres:5432/liyans
      LIYAN_AUDIT_LOG_PATH: /var/lib/liyans/audit/events.jsonl
      LIYAN_ARTIFACT_ROOT: /var/lib/liyans/artifacts
      LIYAN_SSE_CURSOR_SECRET: local-compose-cursor-secret-change-me-32
      LIYAN_OIDC_ISSUER: http://localhost:8080/realms/cybercontrol
      LIYAN_OIDC_AUDIENCE: cybercontrol-api
      LIYAN_OIDC_JWKS_URL: http://keycloak:8080/realms/cybercontrol/protocol/openid-connect/certs
      LIYAN_OIDC_ALGORITHMS: '["RS256"]'
      LIYAN_OIDC_TENANT_CLAIM: tenant_id
      LIYAN_OIDC_ROLES_CLAIM: roles
      LIYAN_OIDC_SCOPE_CLAIM: permissions
      LIYAN_KEYCLOAK_ADMIN_BASE_URL: http://keycloak:8080
      LIYAN_KEYCLOAK_ADMIN_REALM: cybercontrol
      LIYAN_KEYCLOAK_ADMIN_CLIENT_ID: cybercontrol-registration-admin
      LIYAN_KEYCLOAK_ADMIN_CLIENT_SECRET: local-registration-admin-only
      LIYAN_REGISTRATION_ENABLED: "true"
      LIYAN_REGISTRATION_ALLOW_DEVELOPMENT_FALLBACK: "true"
      LIYAN_REGISTRATION_DEVELOPMENT_TENANT_ID: demo-academy
      LIYAN_REGISTRATION_FIXTURE_INBOX_ENABLED: "true"
      LIYAN_IDENTITY_ENCRYPTION_SECRET: local-identity-encryption-secret-change-me-32
      LIYAN_IDENTITY_LOOKUP_PEPPER: local-identity-lookup-pepper-change-me-32
      LIYAN_VERIFICATION_CODE_PEPPER: local-verification-code-pepper-change-me-32
      LIYAN_PROVIDER_EXTERNAL_ENABLED: "true"
      LIYAN_SPARK_TEXT_ENDPOINT: http://mock-provider:8090/v1/responses
      LIYAN_SPARK_TEXT_API_KEY: local-fixture-provider-only
      LIYAN_SPARK_TEXT_MODEL_ALIAS: local-fixture-spark-text-v1
      LIYAN_XFYUN_CODE_ENDPOINT: http://mock-provider:8090/v1/responses
      LIYAN_XFYUN_CODE_API_KEY: local-fixture-provider-only
      LIYAN_XFYUN_CODE_MODEL_ALIAS: local-fixture-code-v1
    ports:
      - "127.0.0.1:${LIYAN_API_HOST_PORT:-8000}:8000"
    volumes:
      - liyans-runtime:/var/lib/liyans
    depends_on:
      keycloak-config:
        condition: service_completed_successfully
      tenant-bind:
        condition: service_completed_successfully
      mock-provider:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    stop_grace_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_OIDC_AUTHORITY: http://localhost:8080/realms/cybercontrol
        VITE_OIDC_CLIENT_ID: cybercontrol-workbench
        VITE_OIDC_SCOPE: openid profile email
    ports:
      - "5173:8080"
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/sbin/nginx", "-t", "-c", "/etc/nginx/nginx.conf"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  liyans-postgres:
  liyans-runtime:
